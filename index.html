function reducer(state, action) {
  switch (action.type) {
    case "LOAD":
      return action.payload;
    case "ADD_TX":
      {
        const tx = action.payload;
        const cuentas = state.cuentas.map(c => {
          if (c.id !== tx.cuenta) return c;
          const delta = tx.tipo === "ingreso" ? tx.monto : tx.tipo === "gasto" ? -tx.monto : 0;
          return {
            ...c,
            saldo: c.saldo + delta
          };
        });
        return {
          ...state,
          transactions: [...state.transactions, tx],
          cuentas
        };
      }
    case "DEL_TX":
      {
        const tx = state.transactions.find(t => t.id === action.payload);
        if (!tx) return state;
        const cuentas = state.cuentas.map(c => {
          if (c.id !== tx.cuenta) return c;
          const delta = tx.tipo === "ingreso" ? -tx.monto : tx.tipo === "gasto" ? tx.monto : 0;
          return {
            ...c,
            saldo: c.saldo + delta
          };
        });
        return {
          ...state,
          transactions: state.transactions.filter(t => t.id !== action.payload),
          cuentas
        };
      }
    case "ADD_PRES":
      return {
        ...state,
        presupuestos: [...state.presupuestos, action.payload]
      };
    case "DEL_PRES":
      return {
        ...state,
        presupuestos: state.presupuestos.filter((_, i) => i !== action.payload)
      };
    case "UPD_PRES":
      return {
        ...state,
        presupuestos: state.presupuestos.map((p, i) => i === action.payload.idx ? {
          ...p,
          limite: action.payload.limite
        } : p)
      };
    case "ADD_FACT":
      return {
        ...state,
        facturas: [...state.facturas, action.payload]
      };
    case "DEL_FACT":
      return {
        ...state,
        facturas: state.facturas.filter(f => f.id !== action.payload)
      };
    case "PAY_FACT":
      {
        const nextMap = {
          Mensual: 1,
          Quincenal: .5,
          Semanal: .25,
          Anual: 12
        };
        return {
          ...state,
          facturas: state.facturas.map(f => f.id === action.payload ? {
            ...f,
            proximoVenc: action.nextDate
          } : f)
        };
      }
    default:
      return state;
  }
}
